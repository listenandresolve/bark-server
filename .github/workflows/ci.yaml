name: Build Sovereign Bark Server
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Upstream Tags
        run: |
          # Cette ligne magique aspire les vrais numéros de version du créateur
          git fetch --tags https://github.com/Finb/bark-server.git

      - name: Debug - Inspecter apns_certs.go
        run: |
          echo "=== Contenu COMPLET du fichier ==="
          cat -A apns/apns_certs.go | head -30
          echo "..."
          echo "=== Recherche de toutes les occurrences de 'Private' ==="
          grep -n "Private\|apnsPriv\|apns_priv\|var apns" apns/apns_certs.go
          echo "=== Nombre total de lignes ==="
          wc -l apns/apns_certs.go

      - name: Patch Source Code
        env:
          P8_KEY: ${{ secrets.P8_KEY }}
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
          KEY_ID: ${{ secrets.KEY_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          # --- Injection des IDs dans apns/apns.go ---
          sed -i "s/topic[[:space:]]*=[[:space:]]*\"me.fin.bark\"/topic = \"${BUNDLE_ID}\"/g" apns/apns.go
          sed -i "s/keyID[[:space:]]*=[[:space:]]*\"LH4T9V5U4R\"/keyID = \"${KEY_ID}\"/g" apns/apns.go
          sed -i "s/teamID[[:space:]]*=[[:space:]]*\"5U8LBRXG3A\"/teamID = \"${TEAM_ID}\"/g" apns/apns.go
      
          # --- Remplacement de apnsPrivateKey dans apns/apns_certs.go ---
          python3 - <<'PYEOF'
          import os
          import re
          
          file_path = "apns/apns_certs.go"
          new_key = os.environ["P8_KEY"].strip()
          
          with open(file_path, "r") as f:
              content = f.read()
          
          # Le fichier utilise "const" et non "var"
          # Pattern : capture const OU var, pour être robuste
          pattern = r'(const|var)\s+apnsPrivateKey\s*=\s*`[^`]*`'
          
          match = re.search(pattern, content, flags=re.DOTALL)
          if not match:
              raise ValueError(f"Pattern introuvable. Début du fichier :\n{repr(content[:500])}")
          
          print(f"✅ Pattern trouvé : commence par '{match.group()[:60]}...'")
          
          # On remplace en conservant le même mot-clé (const ou var) que l'original
          keyword = match.group(1)  # "const" ou "var"
          new_block = f"{keyword} apnsPrivateKey = `\n{new_key}\n`"
          
          new_content = re.sub(pattern, new_block, content, flags=re.DOTALL)
          
          with open(file_path, "w") as f:
              f.write(new_content)
          
          # Vérifications
          count = new_content.count("apnsPrivateKey")
          print(f"✅ Remplacement OK. Occurrences de 'apnsPrivateKey' : {count}")
          
          if count != 1:
              raise ValueError(f"❌ {count} déclarations trouvées, attendu 1 !")
          
          if new_key[:10] not in new_content:
              raise ValueError("❌ La nouvelle clé ne semble pas présente dans le fichier patché !")
          
          print("✅ Toutes les vérifications sont passées.")
          PYEOF

      - name: Debug - Vérifier le fichier patché
        run: |
          echo "=== 10 premières lignes du fichier ==="
          head -10 apns/apns_certs.go
          echo "=== Nombre de déclarations apnsPrivateKey ==="
          grep -c "var apnsPrivateKey" apns/apns_certs.go
          echo "=== Vérification syntaxe Go ==="
          go vet ./apns/...

      - name: Build and Export Docker
        run: |
          docker build -t private-bark:latest -f ./deploy/Dockerfile .
          docker save private-bark:latest > bark-server.tar

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bark-server-image
          path: bark-server.tar
          retention-days: 1
